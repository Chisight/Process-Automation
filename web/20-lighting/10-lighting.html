<div class="container">
    <h1>Kitchen</h1>

    <div class="light-control-group">
        <div class="light-control">
            <button id="light/magic/cabinetlights1/ffffff">Stove Cabinet Lights ON</button> 
            <button id="light/magic/cabinetlights1/000100">Stove Cabinet Lights OFF</button>
        </div>
        <div class="status-container">
            <div id="light/magic/cabinetlights1state" class="status">unknown</div>
            <img class="statusimage" src="" alt="Status Image">
        </div>
    </div>

    <div class="light-control-group">
        <div class="light-control">
            <button id="light/magic/cabinetlights2/ffffff">Breakfast Cabinet Lights ON</button>
            <button id="light/magic/cabinetlights2/000100">Breakfast Cabinet Lights OFF</button>
        </div>
        <div class="status-container">
            <div id="light/magic/cabinetlights2state" class="status">unknown</div>
            <img class="statusimage" src="" alt="Status Image">
        </div>
    </div>

    <div class="light-control-group">
        <div class="light-control">
            <button id="light/magic/stovelight/7f7f">Stove Light ON</button>
            <button id="light/magic/stovelight/000000">Stove Light OFF</button>
        </div>
        <div class="status-container">
            <div id="light/magic/stovelightstate" class="status">unknown</div>
            <img class="statusimage" src="" alt="Status Image">
        </div>
    </div>
</div>
